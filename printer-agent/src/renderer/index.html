<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Assistente de Impressão Menuzia</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; background: #EDEEF1; color: #1F2937; margin: 0; padding: 20px; font-size: 13px; }
    h1 { font-size: 16px; margin: 0 0 4px; }
    p.sub { color: #6B7280; margin: 0 0 16px; }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: #6B7280; margin: 12px 0 4px; }
    input, select { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #E5E7EB; border-radius: 3px; font-size: 13px; }
    button { margin-top: 14px; padding: 9px 14px; border: none; border-radius: 3px; background: #06B6D4; color: white; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; cursor: pointer; }
    button.secondary { background: #374151; }
    button:disabled { opacity: .5; cursor: default; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    #status { margin-top: 14px; padding: 8px 10px; border-radius: 3px; font-size: 12px; }
    #status.ok { background: #DCFCE7; color: #16A34A; }
    #status.erro { background: #FEE2E2; color: #EF4444; }
    #log { margin-top: 18px; background: #111827; color: #9CA3AF; border-radius: 3px; padding: 10px; height: 140px; overflow-y: auto; font-family: Consolas, monospace; font-size: 11px; }
  </style>
</head>
<body>
  <h1>Assistente de Impressão Menuzia</h1>
  <p class="sub">Mantenha esta janela aberta (ou minimizada) para imprimir pedidos automaticamente.</p>

  <label>URL do seu Menuzia</label>
  <input id="apiBaseUrl" placeholder="https://app.suapizzaria.com" />

  <label>Token de pareamento</label>
  <input id="token" placeholder="Cole aqui o token de Ajustes &gt; Impressão" />

  <button id="testarPareamento">Testar conexão</button>
  <div id="statusPareamento"></div>

  <label>Impressora (instalada no Windows)</label>
  <select id="impressoraWindows"></select>
  <button id="atualizarImpressoras" class="secondary">Atualizar lista</button>

  <label>Configuração de impressão (cadastrada no painel)</label>
  <select id="impressoraCloud"></select>
  <p class="sub" style="margin:4px 0 0">Define largura, cópias e fonte usados ao imprimir. Cadastre em Ajustes &gt; Impressão no painel.</p>

  <div class="row">
    <div>
      <button id="salvar">Salvar</button>
    </div>
    <div>
      <button id="testarImpressora" class="secondary">Imprimir teste</button>
    </div>
  </div>

  <div id="status"></div>
  <div id="log"></div>

  <script src="./renderer.js"></script>
</body>
</html>
